  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Level 3: Embedded-C++-Arbeitsbereich

        Implementiere `chooseStudentMove`. Verwende feste Arrays, ein Zeitlimit und einen sicheren Fallback. Dynamische Speicherallokation ist nicht erlaubt.

        Build und Messung:

        ```sh
        platformio run --environment uno-student
        platformio run --environment uno-student --target upload
        ```

        Ziel: gültiger Bot, ungefähr 3 ms Entscheidungszeit und nachvollziehbare SRAM-/Flash-Werte.
    studentConfig:
      content: ""
    teacherConfig:
      content: ""
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: medium

  - url: https://edrys-labs.github.io/module-monaco-editor/
    config:
      value: |
        #ifndef AUTOSNAKE_STUDENT_BOT_H
        #define AUTOSNAKE_STUDENT_BOT_H

        #include "bot_interface.h"

        inline Direction chooseStudentMove(const BotSnapshot& snapshot) {
          // TODO: Sichere, zeitlich begrenzte Strategie implementieren.
          // Keine dynamische Speicherallokation verwenden.
          return snapshot.currentDirection;
        }

        #endif
      runCommand: autosnake-cpp
      language: cpp
      theme: vs-dark
      synchronize: false
