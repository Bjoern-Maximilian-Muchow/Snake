    Remote-Labor zur Automatisierung von Snake auf einem Arduino Uno R3 und
    einem 16x16 RGB-LED-Grid. Das Labor startet simulationsorientiert und wird
    später mit einem physischen LED-Grid und einer Kamerastation verbunden.
