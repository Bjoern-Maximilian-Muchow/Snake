  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Station

        Die physische Station ist für eine spätere Projektphase geplant. Sie stellt einen Arduino Uno R3, ein 16x16 RGB-LED-Grid und eine auf das Grid gerichtete Kamera bereit.

        Aktuell ersetzt der Browser-Simulator die visuelle LED-Grid- und Kameraansicht. Der Python-Simulator und die Tests laufen ohne Arduino-Hardware.

        Sobald die Hardware vorhanden ist, gibt es genau einen aktiven Laborplatz. Lernende müssen diesen Platz nacheinander nutzen.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        ## Spätere Stationsintegration

        Spätere Stationsmodule können serielles Flashen, Terminal- oder Code-Ausführung und Kamerastreaming ergänzen.

        Für den Einzelstationsbetrieb sollte die Lehrperson jeweils nur eine aktive Person an die Hardware lassen. Der Rest der Gruppe arbeitet währenddessen im Simulator und mit Tests.
    stationConfig:
      content: |
        ## Stationsaufbau

        Der spätere Stationsmodus verbindet Arduino Uno R3, RGB-LED-Grid und Kamerastream. Diese Station ist als Einzelarbeitsplatz geplant.
    showInCustom: Station
    width: full
    height: medium
