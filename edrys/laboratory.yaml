modules:
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # AutoSnake Remote Lab

        AutoSnake ist ein Remote-Labor für eingebettete Systeme. Snake läuft zunächst auf einem simulierten 16x16 RGB-LED-Grid; später kann derselbe Ablauf mit einem Arduino Uno R3, einem echten LED-Grid und einer Kamera verbunden werden.

        Repository:
        https://github.com/Bjoern-Maximilian-Muchow/Snake

        Simulator:
        https://bjoern-maximilian-muchow.github.io/Snake/simulator/web/

        **Wichtig:** Es gibt nur einen physischen Laborplatz. Deshalb kann später immer nur eine Person aktiv an der echten Station arbeiten. Alle anderen arbeiten zunächst im Simulator.

        ## Level

        1. Schüler: einfache regelbasierte Steuerung.
        2. Student Anfang Studium: strukturierter Bot mit Spielfeldanalyse und sicheren Zügen.
        3. Fortgeschrittener Student: robuste Pfadsuche, Sicherheitsprüfungen, begrenzte Laufzeit und Tests.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        ## Hinweise für Lehrende

        Das GitHub-Repository bleibt die Quelle der Wahrheit. Aktualisiere das Labor, indem du `edrys/laboratory.yaml` bearbeitest und anschließend die edrys-Lite-Deploy-URL erneut öffnest.

        Da nur ein Laborplatz verfügbar ist, sollte die Nutzung der späteren physischen Station zeitlich vergeben werden. Der Simulator kann parallel von mehreren Lernenden genutzt werden.

        Aktuelles Repository:
        https://github.com/Bjoern-Maximilian-Muchow/Snake
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: medium

  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Aufgaben

        ## Level 1: Schüler

        Schreibe einen einfachen regelbasierten Bot. Er soll grundlegende Wandkollisionen vermeiden und sich grob in Richtung Futter bewegen.

        ## Level 2: Student Anfang Studium

        Schreibe einen strukturierten Bot, der das Spielfeld analysiert, sichere Züge prüft und optional BFS nutzt, um Futter zu finden.

        ## Level 3: Fortgeschrittener Student

        Schreibe einen robusten Bot mit Pfadsuche, Sicherheitschecks, begrenzter Laufzeit und Tests für schwierige Situationen.
