  # Level 3: Embedded C++ und reale Hardware.
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Level 3: Auf Hardware optimieren

        ## Auftrag

        Implementiere `chooseStudentMove` als robuste C++-Strategie. Nutze feste Speichergrenzen, eine sichere Rückfallstrategie und eine zeitlich begrenzte Suche. Dynamische Speicherallokation ist nicht erlaubt.

        Nach erfolgreichem Build wird der Code exklusiv auf den Arduino Uno geladen. Werte anschließend Botzeit, SRAM und Flash aus.

        ## Du hast das Level bestanden, wenn ...

        - `uno-student` erfolgreich kompiliert,
        - keine dynamische Speicherallokation verwendet wird,
        - Hindernisse und der eigene Körper geprüft werden,
        - eine sichere Rückfallstrategie vorhanden ist,
        - die Botentscheidung ungefähr unter 3 ms bleibt,
        - du die gemessenen SRAM-, Flash- und Laufzeitwerte erklären kannst,
        - dein Bot eine unbekannte Challenge-Situation robust bearbeitet.

        ## Das kannst du danach

        Du kannst einen Algorithmus unter realen Speicher- und Zeitgrenzen implementieren, messen und begründet optimieren. Du verstehst den Weg vom getesteten Code bis zur Ausführung auf einem Mikrocontroller.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        Hardwarezugriff einzeln freigeben. Nach dem Upload nicht nur das Spielergebnis, sondern auch Messwerte und Fallback-Verhalten reflektieren lassen.
    stationConfig:
