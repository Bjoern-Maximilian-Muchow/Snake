    config:
      content: |
        # Physische AutoSnake-Station

        Diese Station verbindet Edrys mit dem Arduino Uno R3. Aktuell laufen Game Engine, Lernenden-Bot und Live-Telemetrie bereits auf dem Uno. Das echte 16x16-RGB-Grid und die Kamera werden später ergänzt.
    studentConfig:
