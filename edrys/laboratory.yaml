  # Level 2: strukturierter Python-Bot.
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Level 2: Spielfeld analysieren

        ## Auftrag

        Implementiere nacheinander:

        1. `is_blocked`: Rand, Snake-Körper und Hindernisse erkennen
        2. `safe_moves`: alle aktuell sicheren Richtungen erzeugen
        3. `choose_move`: einen sicheren und begründeten Zug auswählen

        Ergänze anschließend mindestens zwei eigene Randfälle. Ein guter Test beschreibt eine konkrete Gefahr, nicht nur einen bereits geprüften Normalfall.

        ## Du hast das Level bestanden, wenn ...

        - alle vorgegebenen Python-Tests grün sind,
        - dein Bot nur gültige und möglichst sichere Züge auswählt,
        - Hindernisse ab Level 2 berücksichtigt werden,
        - Analyse und Entscheidung in verständliche Funktionen getrennt sind,
        - mindestens zwei eigene Tests vorhanden sind,
        - du erklären kannst, warum Tests Fehler früher sichtbar machen.

        ## Das kannst du danach

        Du kannst einen Spielzustand als Datenmodell auswerten, einen Algorithmus strukturieren und sein Verhalten mit automatisierten Tests absichern.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        Tests schrittweise bearbeiten lassen: zuerst `is_blocked`, danach `safe_moves`, zuletzt `choose_move`. Eigene Randfälle vor der Challenge besprechen.
    stationConfig:
      content: ""
    showInCustom: Room 2
    width: full
    height: tall

