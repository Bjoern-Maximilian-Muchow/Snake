    width: full
    height: tall

  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Willkommen im AutoSnake Remote Lab

        Oben siehst du einen fertigen Bot in Aktion. In diesem Labor steuerst du Snake nicht selbst: Du entwickelst Regeln und Algorithmen, die eigenständig entscheiden.

        ## Dein Lernweg

        ### Level 1: Regeln bauen

        Du setzt Bedingungen und Aktionen zu einem Bot zusammen. Danach kannst du erklären, wie Reihenfolge, Prioritäten und Rückfallregeln eine Entscheidung bestimmen.

        ### Level 2: Spielfeld analysieren

        Du überträgst die Regeln in Python, modellierst blockierte Felder und erzeugst sichere Züge. Danach kannst du einen Algorithmus in Hilfsfunktionen zerlegen und mit Tests verbessern.

        ### Level 3: Auf echter Hardware optimieren

        Du implementierst den Bot hardwarenah in C++, beachtest Speicher und Laufzeit und lädst ihn auf den Arduino Uno. Danach kannst du algorithmische Qualität gegen Ressourcenverbrauch abwägen.

        ## So arbeitest du

        1. Öffne den Raum deines Levels.
        2. Lies Auftrag und Erfolgskriterien.
        3. Entwickle deine eigene Lösung.
        4. Nutze Tests und Challenge statt einer fertigen Bot-Auswahl.
        5. Erkläre am Ende, warum dein Bot so entscheidet.

        Es gibt nur eine physische Station. Simulation und Editoren können parallel genutzt werden; Level 3 greift nach Freigabe nacheinander auf den Uno zu.

        Repository: https://github.com/Bjoern-Maximilian-Muchow/Snake
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        ## Hinweise für Lehrende

        Die Lobby dient nur als Einstieg und Orientierung. Lernende arbeiten anschließend im Raum ihres Levels.

        Referenzbots ausschließlich zur Beobachtung und zum Vergleich verwenden. Hardwarefreigabe erst nach erfüllten Erfolgskriterien erteilen.

        ## Einmalige Raumeinrichtung

        Öffne links oben das Seitenmenü. Falls dort nur die Lobby vorhanden ist, klicke als Eigentümer der Klasse unten dreimal auf **Neuer Raum**. Dadurch entstehen `Room 1`, `Room 2` und `Room 3`; die passenden Levelmodule werden automatisch eingeblendet.
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: tall

  # Level 1: visuelle Regeln.
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Level 1: Regeln bauen

        ## Auftrag

        Entwickle im Aufgabenmodus einen eigenen Snake-Bot aus geordneten Regelblöcken. Der Bot soll Futter grob ansteuern und eine unmittelbar unsichere Richtung vermeiden.

        Arbeite zunächst mit Einzelschritten: Sage vor jedem Schritt voraus, welche Regel ausgeführt wird, und vergleiche deine Vorhersage mit dem Ergebnis.

        ## Du hast das Level bestanden, wenn ...

        - deine Regeln eine sinnvolle Reihenfolge besitzen,
        - eine Sicherheitsregel auf eine blockierte Richtung reagiert,
        - mindestens eine Regel das Futter berücksichtigt,
        - eine Rückfallregel immer einen Zug ermöglicht,
        - dein Bot die unbekannte Challenge-Karte bewältigt,
        - du eine Entscheidung deines Bots mit eigenen Worten erklären kannst.

        ## Das kannst du danach

        Du kannst Bedingungen, Aktionen und Prioritäten zu einem einfachen Algorithmus verbinden. Du erkennst, dass dieselben Regeln je nach Reihenfolge zu anderem Verhalten führen.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        Nicht die fertigen Demo-Bots als Lösung anbieten. Bei Problemen mit einer konkreten Spielsituation und der Reihenfolge der Regeln arbeiten.
    stationConfig:
      content: ""
    showInCustom: Room 1
    width: full
    height: tall

