id: autosnake-remote-lab
name: AutoSnake Remote Lab
meta:
  description: >-
    Lernlabor für regelbasierte Bots, Python-Algorithmen und hardwarenahes C++
    auf einem Arduino Uno R3 mit simuliertem 16x16 RGB-LED-Grid.
selfAssign: true
defaultNumberOfRooms: 1
members:
  teacher: []
  student: []
modules:
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # AutoSnake Remote Lab

        In diesem Labor entwickelst du deinen Bot selbst. Die Beispielbots sind nur im Demo-Modus sichtbar und dienen als Vergleich.

        ## Lernpfad

        1. **Demo:** Strategie beobachten und nächsten Zug vorhersagen.
        2. **Aufgabe:** Eigene Blöcke oder eigenen Code entwickeln.
        3. **Test:** Bekannte Situationen prüfen.
        4. **Challenge:** Unbekannte Karte bearbeiten.
        5. **Hardware:** Erst nach bestandenen Tests auf den einzelnen Uno-Arbeitsplatz wechseln.

        Es gibt nur eine physische Station. Simulator und Editoren können parallel genutzt werden; die Hardware wird nacheinander freigegeben.

        Repository: https://github.com/Bjoern-Maximilian-Muchow/Snake
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        ## Hinweise für Lehrende

        Referenzbots ausschließlich für Demonstration und Vergleich nutzen. Im Aufgabenmodus bearbeiten Lernende eigene Artefakte.

        Hardwarefreigabe erst nach den jeweiligen Tests. Level 3 zusätzlich anhand von Botzeit, SRAM und Flash reflektieren.
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: medium

