id: autosnake-remote-lab
name: AutoSnake Remote Lab
meta:
  description: >-
    Remote-Labor zur Automatisierung von Snake auf einem Arduino Uno R3 und
    einem 16x16 RGB-LED-Grid. Das Labor startet simulationsorientiert und wird später
    mit einem physischen LED-Grid und einer Kamerastation verbunden.
selfAssign: true
defaultNumberOfRooms: 0
members:
  teacher: []
  student: []
modules:
  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: >-
        # AutoSnake Remote Lab

        AutoSnake ist ein Remote-Labor für eingebettete Systeme. Snake läuft
        zunächst auf einem simulierten 16x16 RGB-LED-Grid; später kann derselbe
        Ablauf mit einem Arduino Uno R3, einem echten LED-Grid und einer Kamera
        verbunden werden.

        Repository:
        https://github.com/Bjoern-Maximilian-Muchow/Snake

        Simulator:
        https://bjoern-maximilian-muchow.github.io/Snake/simulator/web/

        Level:

        1. Schüler: einfache regelbasierte Steuerung.

        2. Student Anfang Studium: strukturierter Bot mit Spielfeldanalyse und
        sicheren Zügen.

        3. Fortgeschrittener Student: robuste Pfadsuche, Sicherheitsprüfungen,
        begrenzte Laufzeit und Tests.
    studentConfig:
      content: ""
    teacherConfig:
      content: >-
        ## Hinweise für Lehrende

        Das GitHub-Repository bleibt die Quelle der Wahrheit. Aktualisiere das
        Labor, indem du `edrys/laboratory.yaml` bearbeitest und anschließend die
        edrys-Lite-Deploy-URL erneut öffnest.

        Aktuelles Repository:
        https://github.com/Bjoern-Maximilian-Muchow/Snake
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: medium

  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: >-
        # Aufgaben

        ## Level 1: Schüler

        Schreibe einen einfachen regelbasierten Bot. Er soll grundlegende
        Wandkollisionen vermeiden und sich grob in Richtung Futter bewegen.

        ## Level 2: Student Anfang Studium

        Schreibe einen strukturierten Bot, der das Spielfeld analysiert,
        sichere Züge prüft und optional BFS nutzt, um Futter zu finden.

        ## Level 3: Fortgeschrittener Student

        Schreibe einen robusten Bot mit Pfadsuche, Sicherheitschecks,
        begrenzter Laufzeit und Tests für schwierige Situationen.
    studentConfig:
      content: ""
    teacherConfig:
      content: ""
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: tall

  - url: https://bjoern-maximilian-muchow.github.io/Snake/simulator/web/
    config: ""
    studentConfig: ""
    teacherConfig: ""
    stationConfig: ""
    showInCustom: Lobby
    width: full
    height: tall

  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: >-
        # Station

        Die physische Station ist für eine spätere Projektphase geplant. Sie
        stellt einen Arduino Uno R3, ein 16x16 RGB-LED-Grid und eine auf das Grid
        gerichtete Kamera bereit.

        Aktuell ersetzt der Browser-Simulator die visuelle LED-Grid- und
        Kameraansicht. Der Python-Simulator und die Tests laufen ohne
        Arduino-Hardware.
    studentConfig:
      content: ""
    teacherConfig:
      content: >-
        ## Spätere Stationsintegration

        Spätere Stationsmodule können serielles Flashen, Terminal- oder
        Code-Ausführung und Kamerastreaming ergänzen. Die aktuelle Konfiguration
        hält diese Teile bewusst als dokumentierte Platzhalter fest.
    stationConfig:
      content: >-
        ## Stationsaufbau

        Der spätere Stationsmodus verbindet Arduino Uno R3, RGB-LED-Grid und
        Kamerastream.
    showInCustom: Station
    width: full
    height: medium
