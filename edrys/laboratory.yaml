  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Level 2: Python-Arbeitsbereich

        Implementiere nacheinander `is_blocked`, `safe_moves` und `choose_move`. Der Editor startet absichtlich mit einer unvollständigen Lösung.

        Lokaler Testbefehl:

        ```sh
        python -m pytest learning/level2/test_student_bot.py
        ```

        Ziel: Alle Tests grün, danach mindestens zwei eigene Randfälle ergänzen.
    studentConfig:
      content: ""
    teacherConfig:
      content: ""
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: medium

