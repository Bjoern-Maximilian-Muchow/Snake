  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Tests und Hardwarefreigabe

        ## Level 1

        - Rückfallregel vorhanden
        - Reaktion auf blockierte Richtung
        - unbekannte Challenge-Karte abgeschlossen

        ## Level 2

        - vorgegebene Python-Tests grün
        - mindestens zwei eigene Tests
        - unbekannte Hinderniskarte sicher bearbeitet

        ## Level 3

        - `uno-student` kompiliert
        - keine dynamische Speicherallokation
        - sichere Rückfallstrategie
        - Botzeit ungefähr unter 3 ms
        - Messwerte erklärt

        Die Ausführen-Schaltflächen der Editoren publizieren `autosnake-python` bzw. `autosnake-cpp`. Der ausführende Stationsdienst wird im nächsten Integrationsschritt angeschlossen.
    studentConfig:
      content: ""
    teacherConfig:
      content: |
        Hardwarefreigabe dokumentieren. Es kann immer nur eine Person gleichzeitig auf die physische Station zugreifen.
    stationConfig:
      content: ""
    showInCustom: Lobby
    width: full
    height: tall

  - url: https://edrys-labs.github.io/module-markdown-it/index.html
    config:
      content: |
        # Physische Station

        Die Station stellt später Arduino Uno R3, 16x16 RGB-LED-Grid, Kamera und den Ausführungsdienst bereit.

        Aktuell läuft die Game Engine bereits auf dem Uno und liefert Live-Telemetrie für Botzeit, Enginezeit, Last, SRAM und Flash.
    studentConfig:
      content: |
        Warte auf die Freigabe durch die Lehrperson. Simulator, Tests und Editor bleiben währenddessen verfügbar.
    teacherConfig:
      content: |
        Nur eine aktive Person an die Hardware lassen. Nach Upload Messwerte und Kamerabild gemeinsam auswerten.
    stationConfig:
      content: |
        Nächster Ausbau: pyxtermjs-Dienst mit den Topics `autosnake-python` und `autosnake-cpp` verbinden.
    showInCustom: Station
    width: full
    height: medium
