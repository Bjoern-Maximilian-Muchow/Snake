[platformio]
src_dir = firmware/arduino_uno/AutoSnakeUno

[env:uno]
platform = atmelavr
board = uno
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
monitor_filters = time

[env:uno-student]
extends = env:uno
build_flags =
  -DAUTOSNAKE_STUDENT_BOT
  -I learning/level3
