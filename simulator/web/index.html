<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoSnake Simulator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="toolbar">
        <h1>AutoSnake Simulator</h1>
        <div class="stats">
          <span>Punkte: <strong id="score">0</strong></span>
          <span>Status: <strong id="status">Läuft</strong></span>
        </div>
        <button id="reset" type="button">Zurücksetzen</button>
      </section>
      <section id="grid" class="grid" aria-label="16 mal 16 Snake-LED-Grid"></section>
    </main>
    <script src="simulator.js"></script>
  </body>
</html>
